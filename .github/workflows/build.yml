name: Build Windows x64 EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12 x64
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame-ce opensimplex numpy pyinstaller Pillow

      - name: Create icon
        run: |
          python -c "
          from PIL import Image
          img = Image.open('img/idle1.png').convert('RGBA')
          w, h = img.size
          top = img.crop((0, 0, w, h // 2))
          sizes = [(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)]
          icons = [top.resize(s, Image.NEAREST) for s in sizes]
          icons[-1].save('icon.ico', format='ICO', sizes=sizes, append_images=icons[:-1])
          "

      - name: Build EXE
        run: |
          python -m PyInstaller --onefile --windowed --name "RedRidingHood" --icon "icon.ico" --add-data "img;img" --add-data "music;music" --add-data "AmaticSC-Bold.ttf;." RedRidingHood.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RedRidingHood-Windows-x64
          path: dist/RedRidingHood.exe
